<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>__MSG_extensionName__</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1 data-i18n="popupTitle"></h1>
          <p id="countText"></p>
        </div>
        <button id="saveCurrentButton" class="primary" type="button" data-i18n="saveCurrentButton"></button>
      </header>

      <section class="quick-add" data-i18n-aria-label="manualAddLabel">
        <input id="manualUrlInput" type="url" data-i18n-placeholder="manualUrlPlaceholder">
        <button id="manualAddButton" type="button" data-i18n="manualAddButton"></button>
      </section>

      <section class="controls" data-i18n-aria-label="filterLabel">
        <input id="searchInput" type="search" data-i18n-placeholder="searchPlaceholder">
        <select id="statusFilter" data-i18n-aria-label="statusFilterLabel">
          <option value="all" data-i18n="statusAll"></option>
          <option value="inbox" data-i18n="statusInbox"></option>
          <option value="done" data-i18n="statusDone"></option>
        </select>
      </section>

      <section id="tagFilters" class="tag-filters" data-i18n-aria-label="tagFilterLabel"></section>
      <section id="message" class="message" hidden></section>
      <section id="list" class="list" aria-live="polite"></section>

      <footer class="footer">
        <button id="exportJsonButton" type="button" data-i18n="exportJsonButton"></button>
        <button id="exportMarkdownButton" type="button" data-i18n="exportMarkdownButton"></button>
        <button id="clearDoneButton" type="button" data-i18n="clearDoneButton"></button>
      </footer>
    </main>

    <template id="itemTemplate">
      <article class="item">
        <div class="item-head">
          <img class="item-favicon" alt="">
          <div class="item-title-wrap">
            <a class="item-title" target="_blank" rel="noreferrer"></a>
            <p class="item-url"></p>
          </div>
        </div>
        <p class="item-description"></p>
        <input class="item-tags" type="text" data-i18n-placeholder="tagsPlaceholder">
        <textarea class="item-note" rows="2" data-i18n-placeholder="notePlaceholder"></textarea>
        <div class="item-actions">
          <button class="status-button" type="button"></button>
          <button class="markdown-button" type="button" data-i18n="copyMarkdownButton"></button>
          <button class="delete-button danger" type="button" data-i18n="deleteButton"></button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
